name: Nagi CI/CD

on:
  push:
    branches: [master]
    tags: ['*.*.*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SixLaborsLicenseKey: ${{ secrets.SIXLABORS_LICENSE_KEY }}

jobs:
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/Directory.Build.props
            **/NuGet.config

      - uses: FedericoCarboni/setup-ffmpeg@v3.1

      - name: Run tests
        run: dotnet test tests/Nagi.Core.Tests/Nagi.Core.Tests.csproj -c Release --logger "trx;logfilename=test-results.trx"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: '**/test-results.trx'

  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/Directory.Build.props
            **/NuGet.config

      - run: dotnet publish api/NagiAppFunctions/NagiAppFunctions.csproj -c Release -o ./functions-output

      - name: Verify Functions worker dependency compatibility
        shell: pwsh
        run: |
          $output = & dotnet ./functions-output/NagiAppFunctions.dll 2>&1 | Out-String
          if ($output -match 'TypeLoadException|FileLoadException|MissingMethodException') {
            throw "Functions worker dependency compatibility check failed:`n$output"
          }
          if ($output -notmatch 'HostEndpoint') {
            throw "Functions worker did not reach the expected host configuration boundary:`n$output"
          }

      - uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/functions-action@v1.5.6
        with:
          app-name: nagiflexapiserver
          package: ./functions-output

  benchmark:
    name: Run Benchmarks
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/Directory.Build.props
            **/NuGet.config

      - uses: FedericoCarboni/setup-ffmpeg@v3.1

      - run: dotnet run -c Release --project benchmarks/Nagi.Benchmarks/Nagi.Benchmarks.csproj -- --filter *LibraryScanBenchmarks*

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Benchmark-Results
          path: BenchmarkDotNet.Artifacts/results/

      - name: Write benchmark summary
        if: always()
        shell: pwsh
        run: |
          $md = Get-ChildItem "BenchmarkDotNet.Artifacts/results/*.md" | Select-Object -First 1
          if ($md) { Get-Content $md.FullName | Out-File $env:GITHUB_STEP_SUMMARY -Append }

  verify-api-connectivity:
    name: Verify API Connectivity
    runs-on: ubuntu-latest
    needs: [test, deploy-functions]
    if: >-
      always() &&
      needs.test.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') || needs.deploy-functions.result == 'success')
    steps:
      - name: Smoke test API
        timeout-minutes: 5
        env:
          API_KEY: ${{ secrets.NAGI_API_KEY }}
        run: |
          for attempt in {1..12}; do
            if STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
              -H "X-API-KEY: ${API_KEY}" \
              "https://nagiflexapiserver.azurewebsites.net/api/lastfm-key"); then
              if [ "$STATUS" -eq 200 ]; then
                echo "API OK (HTTP $STATUS)"
                exit 0
              fi
            else
              STATUS="curl exit $?"
            fi

            echo "API not ready (attempt $attempt/12: $STATUS)"
            if [ "$attempt" -lt 12 ]; then sleep 10; fi
          done

          echo "::error::API check failed after deployment (last result: $STATUS)"
          exit 1

  build-msix:
    name: Build MSIX Bundle
    runs-on: windows-latest
    needs: [test, verify-api-connectivity]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/Directory.Build.props
            **/NuGet.config

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $v = (Select-String -Path Directory.Build.props -Pattern '<AppxPackageVersion>([^<]+)').Matches[0].Groups[1].Value
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Create appsettings.json
        shell: pwsh
        env:
          DISCORD_APP_ID: ${{ secrets.NAGI_DISCORD_KEY }}
          API_KEY: ${{ secrets.NAGI_API_KEY }}
        run: |
          @{ Discord = @{ AppId = $env:DISCORD_APP_ID }; NagiApiServer = @{ Url = 'https://nagiflexapiserver.azurewebsites.net'; ApiKey = $env:API_KEY } } |
            ConvertTo-Json -Depth 3 | Out-File src/Nagi.WinUI/appsettings.json -Encoding UTF8

      - run: dotnet restore src/Nagi.WinUI/Nagi.WinUI.csproj

      - name: Patch manifest Publisher for sideload signing
        shell: pwsh
        env:
          CERT_SUBJECT: ${{ startsWith(github.ref, 'refs/tags/') && vars.SIGNPATH_CERT_SUBJECT || vars.SIGNPATH_TEST_CERT_SUBJECT || vars.SIGNPATH_CERT_SUBJECT }}
        run: |
          $manifest = "src/Nagi.WinUI/Package.appxmanifest"
          (Get-Content $manifest) -replace 'Publisher="[^"]*"', "Publisher=`"$env:CERT_SUBJECT`"" |
            Set-Content $manifest

      - name: Pre-build x64 binaries
        run: >
          dotnet publish src/Nagi.WinUI/Nagi.WinUI.csproj
          -c Release -r win-x64
          -p:Platform=x64
          -p:PublishReadyToRun=true
          -p:TieredPGO=true
          -p:GenerateAppxPackageOnBuild=false
          -p:AppxPackageSigningEnabled=False
          -p:PackageCertificateThumbprint=""
          -p:GenerateTemporaryStoreCertificate=False

      - name: Pre-build ARM64 binaries
        run: >
          dotnet publish src/Nagi.WinUI/Nagi.WinUI.csproj
          -c Release -r win-arm64
          -p:Platform=ARM64
          -p:PublishReadyToRun=true
          -p:TieredPGO=true
          -p:GenerateAppxPackageOnBuild=false
          -p:AppxPackageSigningEnabled=False
          -p:PackageCertificateThumbprint=""
          -p:GenerateTemporaryStoreCertificate=False

      - name: Build MSIX bundle
        run: >
          dotnet msbuild src/Nagi.WinUI/Nagi.WinUI.csproj
          /p:Configuration=Release /p:Platform=x64
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxBundle=Always /p:AppxBundlePlatforms="x64|ARM64"
          /p:AppxPackageSigningEnabled=False
          /p:PackageCertificateThumbprint=""
          /p:GenerateTemporaryStoreCertificate=False
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageDir=${{ github.workspace }}/bundle-output/

      - name: Locate msixbundle
        id: find_bundle
        shell: pwsh
        run: |
          $bundle = Get-ChildItem "${{ github.workspace }}/bundle-output" -Recurse -Filter *.msixbundle | Select-Object -First 1
          if (-not $bundle) { throw "msixbundle not found in bundle-output" }
          Copy-Item $bundle.FullName "${{ github.workspace }}/bundle-output/Nagi.msixbundle"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Unsigned-MSIX
          path: ${{ github.workspace }}/bundle-output/Nagi.msixbundle
          if-no-files-found: error

  sign-msix:
    name: Sign MSIX (SignPath)
    runs-on: ubuntu-latest
    needs: build-msix
    if: github.ref == 'refs/heads/master'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: signpath/github-action-submit-signing-request@v2.2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: Nagi
          artifact-configuration-slug: msixbundle
          signing-policy-slug: test-signing
          github-artifact-id: '${{ needs.build-msix.outputs.artifact-id }}'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: ./signed
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Signed-MSIX
          path: ./signed/
