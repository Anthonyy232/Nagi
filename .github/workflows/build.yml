name: Nagi CI/CD

on:
  push:
    branches: [master]
    tags: ['*.*.*']

jobs:
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/NuGet.config') }}
          restore-keys: ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Run tests
        run: dotnet test tests/Nagi.Core.Tests/Nagi.Core.Tests.csproj -c Release --logger "trx;logfilename=test-results.trx"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet publish api/NagiAppFunctions/NagiAppFunctions.csproj -c Release -o ./functions-output

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/functions-action@v1
        with:
          app-name: nagiflexapiserver
          package: ./functions-output

  benchmark:
    name: Run Benchmarks
    runs-on: windows-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/NuGet.config') }}
          restore-keys: ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: FedericoCarboni/setup-ffmpeg@v3

      - run: dotnet run -c Release --project benchmarks/Nagi.Benchmarks/Nagi.Benchmarks.csproj -- --filter *LibraryScanBenchmarks*

      - uses: actions/upload-artifact@v4
        with:
          name: Benchmark-Results
          path: BenchmarkDotNet.Artifacts/results/

      - name: Write benchmark summary
        if: always()
        shell: pwsh
        run: |
          $md = Get-ChildItem "BenchmarkDotNet.Artifacts/results/*.md" | Select-Object -First 1
          if ($md) { Get-Content $md.FullName | Out-File $env:GITHUB_STEP_SUMMARY -Append }

  verify-api-connectivity:
    name: Verify API Connectivity
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Smoke test API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 --retry 3 --retry-delay 5 \
            -H 'X-API-KEY: ${{ secrets.NAGI_API_KEY }}' \
            "https://nagiflexapiserver.azurewebsites.net/api/lastfm-key")
          [ "$STATUS" -eq 200 ] || { echo "::error::API check failed (HTTP $STATUS)"; exit 1; }
          echo "API OK (HTTP $STATUS)"

  build-msix:
    name: Build MSIX Bundle
    runs-on: windows-latest
    needs: [test, verify-api-connectivity]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/NuGet.config') }}
          restore-keys: ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: microsoft/setup-msbuild@v2

      - name: Get version
        id: version
        shell: bash
        run: |
          v=$(grep -oP '(?<=<AppxPackageVersion>)[^<]+' Directory.Build.props)
          echo "value=$v" >> $GITHUB_OUTPUT

      - name: Create appsettings.json
        shell: pwsh
        run: |
          @{ Discord = @{ AppId = '${{ secrets.NAGI_DISCORD_KEY }}' }; NagiApiServer = @{ Url = 'https://nagiflexapiserver.azurewebsites.net'; ApiKey = '${{ secrets.NAGI_API_KEY }}' } } |
            ConvertTo-Json -Depth 3 | Out-File src/Nagi.WinUI/appsettings.json -Encoding UTF8

      - run: dotnet restore src/Nagi.WinUI/Nagi.WinUI.csproj

      - name: Patch manifest Publisher for sideload signing
        shell: pwsh
        run: |
          $manifest = "src/Nagi.WinUI/Package.appxmanifest"
          (Get-Content $manifest) -replace 'Publisher="[^"]*"', 'Publisher="${{ vars.SIGNPATH_CERT_SUBJECT }}"' |
            Set-Content $manifest

      - name: Build x64 MSIX
        run: >
          msbuild src/Nagi.WinUI/Nagi.WinUI.csproj
          /p:Configuration=Release /p:Platform=x64
          /p:AppxBundle=Never /p:AppxPackageSigningEnabled=False
          /p:GenerateTemporaryStoreCertificate=False
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageDir=${{ github.workspace }}/msix/x64/

      - name: Build ARM64 MSIX
        run: >
          msbuild src/Nagi.WinUI/Nagi.WinUI.csproj
          /p:Configuration=Release /p:Platform=ARM64
          /p:AppxBundle=Never /p:AppxPackageSigningEnabled=False
          /p:GenerateTemporaryStoreCertificate=False
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageDir=${{ github.workspace }}/msix/arm64/

      - name: Create msixbundle
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter makeappx.exe |
            Where-Object { $_.FullName -match "\\x64\\" } | Select-Object -First 1
          if (-not $makeappx) { throw "makeappx.exe not found" }

          $input = "${{ github.workspace }}/bundle-input"
          New-Item -ItemType Directory -Path $input -Force | Out-Null
          Get-ChildItem "${{ github.workspace }}/msix" -Recurse -Filter *.msix |
            ForEach-Object { Copy-Item $_.FullName $input }

          New-Item -ItemType Directory -Path "${{ github.workspace }}/bundle-output" -Force | Out-Null
          & $makeappx.FullName bundle /d $input /p "${{ github.workspace }}/bundle-output/Nagi.msixbundle"
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed" }

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-MSIX
          path: ${{ github.workspace }}/bundle-output/Nagi.msixbundle

  sign-msix:
    name: Sign MSIX (SignPath)
    runs-on: ubuntu-latest
    needs: build-msix
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read
    steps:
      # Switch signing-policy-slug to 'release-signing' once the production certificate is issued.
      - uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: Nagi
          artifact-configuration-slug: msixbundle
          signing-policy-slug: test-signing
          github-artifact-id: '${{ needs.build-msix.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: ./signed
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - uses: actions/upload-artifact@v4
        with:
          name: Signed-MSIX
          path: ./signed/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-msix, sign-msix]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download signed MSIX
        uses: actions/download-artifact@v4
        with:
          name: Signed-MSIX
          path: ./signed

      - name: Generate .appinstaller
        shell: bash
        env:
          VERSION: ${{ needs.build-msix.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BASE_URL="https://github.com/${REPO}/releases/latest/download"
          cat > signed/Nagi.appinstaller <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller Uri="${BASE_URL}/Nagi.appinstaller"
                        Version="${VERSION}"
                        xmlns="http://schemas.microsoft.com/appx/appinstaller/2018">
            <MainBundle Name="48743Nagi.Nagi"
                        Version="${VERSION}"
                        Publisher="${{ vars.SIGNPATH_CERT_SUBJECT }}"
                        Uri="${BASE_URL}/Nagi.msixbundle"/>
            <UpdateSettings>
              <OnLaunch HoursBetweenUpdateChecks="0"/>
            </UpdateSettings>
          </AppInstaller>
          EOF

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Version ${{ github.ref_name }}" \
            --draft \
            signed/Nagi.msixbundle \
            signed/Nagi.appinstaller
